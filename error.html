<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Error — Chris Portka</title>
  <meta name="description" content="Something shorted out. Chris Portka, songwriter from Berkeley, California.">
  <meta name="theme-color" content="#100c17">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<main>
  <!-- the crimson color-way: same broken broadcast, hotter channel —
       for anything that goes wrong that isn't a plain missing page -->
  <section class="glitch-scene glitch-scene--crimson" aria-labelledby="err-title">
    <div class="glitch-jolt">
      <p class="glitch-word" data-text="error" aria-hidden="true">error</p>
      <h1 id="err-title" style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(2rem,5vw,3.25rem);margin:0 0 1rem;letter-spacing:-0.005em;"><span class="neon-404">Something shorted out</span></h1>
      <p class="err-line"><span class="visually-hidden">Give it a second, or head back to the music.</span><span id="err-line" aria-hidden="true">Give it a second, or head back to the music.</span></p>
      <p class="err-back"><a href="/" class="neon-link">Back to chrisportka.com</a></p>
      <svg class="glitch-chicken" viewBox="12 0 84 118" aria-hidden="true">
        <path class="ck ck-a" d="M40 26 L42 16 L47 24 L51 14 L55 24 Q64 26 62 38 L72 40 L60 46 L62 54 Q84 52 92 84 Q78 74 66 74 Q70 96 40 96 Q14 96 18 68 Q20 48 40 46 Q34 36 40 26 Z"/>
        <path class="ck ck-b" d="M40 26 L42 16 L47 24 L51 14 L55 24 Q64 26 62 38 L72 40 L60 46 L62 54 Q84 52 92 84 Q78 74 66 74 Q70 96 40 96 Q14 96 18 68 Q20 48 40 46 Q34 36 40 26 Z"/>
        <path class="ck ck-core" d="M40 26 L42 16 L47 24 L51 14 L55 24 Q64 26 62 38 L72 40 L60 46 L62 54 Q84 52 92 84 Q78 74 66 74 Q70 96 40 96 Q14 96 18 68 Q20 48 40 46 Q34 36 40 26 Z"/>
      </svg>
    </div>
    <div class="glitch-scan" aria-hidden="true"></div>
  </section>
</main>
<script>
(function () {
  if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var el = document.getElementById('err-line');
  if (!el) return;
  var original = el.textContent;
  var glyphs = '#%&{}[]<>/\\|=+*^~';
  setInterval(function () {
    var chars = original.split('');
    for (var n = 0; n < 3; n++) {
      var i = Math.floor(Math.random() * chars.length);
      if (chars[i] !== ' ') chars[i] = glyphs[Math.floor(Math.random() * glyphs.length)];
    }
    el.textContent = chars.join('');
    setTimeout(function () { el.textContent = original; }, 140);
  }, 3400);
})();
</script>
</body>
</html>
